<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Весенний Проект</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: #333;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #flowers-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }

        .flower {
            position: absolute; top: -20px; width: 15px; height: 15px;
            background: #ffb7c5; border-radius: 15px 0 15px 0;
            opacity: 0.7; animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }

        .content-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 90%; max-width: 400px; z-index: 2; text-align: center;
        }

        h1 { font-size: 24px; font-weight: 800; margin-bottom: 15px; color: #2c3e50; }
        p { font-size: 14px; color: #7f8c8d; margin-bottom: 30px; line-height: 1.5; }

        .input-group { margin-bottom: 20px; }
        input {
            width: 100%; padding: 15px; border: 2px solid #e0e0e0;
            border-radius: 15px; font-family: 'Nunito', sans-serif;
            font-size: 15px; outline: none; transition: border-color 0.3s;
        }
        input:focus { border-color: #a18cd1; }

        .rainbow-btn {
            position: relative; padding: 3px; border-radius: 20px;
            background: transparent; border: none; cursor: pointer;
            overflow: hidden; width: 100%; outline: none; margin-top: 10px;
        }

        .rainbow-btn span {
            display: block; padding: 15px 20px; background: #fff;
            border-radius: 17px; font-family: 'Nunito', sans-serif;
            font-size: 16px; font-weight: 800; color: #333;
            position: relative; z-index: 2; transition: background 0.3s, color 0.3s;
        }

        .rainbow-btn::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000);
            z-index: 1; transition: opacity 0.3s; opacity: 0;
        }

        .rainbow-btn:hover::before, .rainbow-btn:active::before {
            opacity: 1; animation: spin 2s linear infinite;
        }

        .rainbow-btn:hover span { background: #fafafa; color: #000; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="flowers-container"></div>

    <div class="content-card">
        <h1>Присоединяйся!</h1>
        <p>Авторизуйся, чтобы ставить лайки, писать комментарии и стать частью команды.</p>
        
        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Придумай логин" required>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Твой Email" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Пароль" required>
            </div>
            <button type="submit" class="rainbow-btn">
                <span>Зарегистрироваться</span>
            </button>
        </form>
    </div>

    <script>
        // Анимация падающих лепестков
        function createFlower() {
            const container = document.getElementById('flowers-container');
            const flower = document.createElement('div');
            flower.classList.add('flower');
            flower.style.left = Math.random() * 100 + 'vw';
            flower.style.animationDuration = Math.random() * 4 + 3 + 's';
            const size = Math.random() * 10 + 10; 
            flower.style.width = size + 'px';
            flower.style.height = size + 'px';
            container.appendChild(flower);
            setTimeout(() => { flower.remove(); }, 7000);
        }
        setInterval(createFlower, 400);

        // Отправка данных на сервер Python
        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // ВАЖНО: Когда загрузишь бэкенд на Render, замени этот URL на ссылку от Render (например: https://my-server.onrender.com/api/register)
            const serverUrl = 'http://127.0.0.1:5000/api/register';

            try {
                const response = await fetch(serverUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const result = await response.json();

                if (result.success) {
                    alert('Регистрация успешна! Добро пожаловать, ' + username);
                } else {
                    alert('Ошибка регистрации: ' + result.error);
                }
            } catch (error) {
                alert('Ошибка соединения. Убедись, что сервер app.py запущен!');
                console.error(error);
            }
        });
    </script>
</body>
</html>
