<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Посмотри в окно</title>
  <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
  <div class="page">
    <main class="content">
      
      <form class="search-form" id="search-form">
        <fieldset>
          <legend class="search-form__fieldset-title">Город</legend>
          <label class="search-form__label">
            <input type="text" class="search-form__input" placeholder="Санкт-Петербург, например" name="city">
          </label>
        </fieldset>

        <fieldset>
          <legend class="search-form__fieldset-title">Время суток</legend>
          <div class="search-form__checkbox-list">
            <label class="search-form__label">
              <input type="checkbox" class="search-form__checkbox visually-hidden" name="time" value="Утро">
              <span class="search-form__pseudo-checkbox"></span>
              <span>Утро</span>
            </label>
            <label class="search-form__label">
              <input type="checkbox" class="search-form__checkbox visually-hidden" name="time" value="День">
              <span class="search-form__pseudo-checkbox"></span>
              <span>День</span>
            </label>
            <label class="search-form__label">
              <input type="checkbox" class="search-form__checkbox visually-hidden" name="time" value="Ночь">
              <span class="search-form__pseudo-checkbox"></span>
              <span>Ночь</span>
            </label>
          </div>
        </fieldset>

        <button type="submit" class="button search-form__submit-button">Найти</button>
      </form>

      <section class="result__video-container" id="video-container">
        <video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay muted loop controls></video>
      </section>

      <section class="content__details">
        <h1 class="title">
          По- <span class="content__accent">смотри</span> в окно
        </h1>
        <div class="content__list-container" id="list-container">
          </div>
      </section>
      
    </main>
  </div>

  <template class="video-card-template" id="video-card-template">
    <li class="content__list-item">
      <a href="#" class="content__card-link">
        <article class="content__video-card">
          <img src="" alt="Превью" class="content__video-card-thumbnail">
          <div class="content__video-card-description-container">
            <h2 class="content__video-card-title"></h2>
            <p class="content__video-card-description"></p>
          </div>
        </article>
      </a>
    </li>
  </template>

  <template class="preloader-template" id="preloader-template">
    <div class="preloader">Загрузка...</div>
  </template>

  <template class="more-button-template" id="more-button-template">
    <button class="button more-button">Показать еще</button>
  </template>

  <template class="error-template" id="error-template">
    <div class="error-message">Нет подходящих видео :(</div>
  </template>

  <script src="./scripts/script.js"></script>
</body>
</html>
