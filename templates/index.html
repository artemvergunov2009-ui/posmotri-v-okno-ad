<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaStudio — Канал</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --purple: #7b2cbf; --dark: #240046; --light: #e0aaff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; overflow-x: hidden; }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .profile-btn { cursor: pointer; background: var(--purple); padding: 10px 20px; border-radius: 12px; font-weight: 800; border: none; color: #fff; }

        /* SIDEBAR */
        nav {
            position: fixed; left: 0; top: 70px; width: 260px; height: calc(100vh - 70px);
            background: rgba(255,255,255,0.02); padding: 20px; border-right: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn {
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 12px;
            background: transparent; border: 1px solid var(--light); color: var(--light);
            cursor: pointer; text-align: left; font-weight: 600; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--purple); color: #fff; border-color: var(--purple); }

        /* MAIN AREA */
        main { margin-left: 260px; margin-top: 70px; padding: 40px; display: flex; justify-content: center; }
        #feed { width: 100%; max-width: 700px; }

        /* MODALS */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #3c096c; padding: 30px; border-radius: 25px; width: 90%; max-width: 500px;
            border: 1px solid var(--light); position: relative;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; cursor: pointer; font-size: 24px; }
        
        /* POST DESIGN */
        .post { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .post video { width: 100%; border-radius: 15px; margin: 15px 0; background: #000; }
        .post h2 { color: var(--light); }
        .post-tags { color: #9d4edd; font-size: 14px; margin: 5px 0; }
        
        input, textarea, select { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--light); border-radius: 10px; color: #fff; margin-bottom: 15px; outline: none; }
        .red-btn { background: #ff4d4d !important; }
        .hidden { display: none; }

        /* RAINBOW EFFECT */
        .rainbow { position: relative; overflow: hidden; }
        .rainbow:hover::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(red, yellow, green, cyan, blue, magenta, red);
            animation: rotate 2s linear infinite; z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        #flowers-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .flower { position: absolute; background: var(--light); border-radius: 10px 0; opacity: 0.3; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>
    <div id="flowers-container"></div>
    <header>
        <h2 style="color: var(--light)">MediaStudio</h2>
        <button class="profile-btn" id="accountBtn" onclick="openModal('accountModal')">Личный кабинет</button>
    </header>

    <nav id="sidebar" class="hidden">
        <div id="admin-tools" class="hidden">
            <button class="nav-btn" onclick="openManagerList()">Список руководителей</button>
            <button class="nav-btn" onclick="openSubList()">Список подписчиков</button>
            <button class="nav-btn" onclick="openModal('addManagerModal')">Добавить руководителя</button>
        </div>
        <div id="post-tools" class="hidden">
            <button class="nav-btn" onclick="openModal('postModal')">Добавить пост</button>
            <button class="nav-btn" onclick="openEditList()">Изменить пост</button>
            <button class="nav-btn" onclick="openDeleteList()">Удалить пост</button>
        </div>
    </nav>

    <main>
        <div id="feed">
            <h1 id="empty-msg" class="hidden" style="text-align:center; margin-top:50px; opacity:0.5;">Посты на данном канале временно отсутствуют!</h1>
            <div id="posts-list"></div>
        </div>
    </main>

    <div id="accountModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('accountModal')">&times;</span>
            <h2 style="margin-bottom:20px;">Ваш профиль</h2>
            <div id="userData" style="line-height: 2;"></div>
            <hr style="margin:20px 0; opacity:0.2;">
            <button class="nav-btn" onclick="closeModal('accountModal')">Вернуться на главную</button>
            <button class="nav-btn red-btn" onclick="logout()">Выйти из аккаунта</button>
        </div>
    </div>

    <div id="postModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('postModal')">&times;</span>
            <h2>Новая публикация</h2>
            <input type="text" id="pTitle" placeholder="Заголовок">
            <textarea id="pText" placeholder="Сообщение..." rows="4"></textarea>
            <input type="text" id="pTags" placeholder="#хештеги">
            <input type="text" id="pLink" placeholder="Ссылка (URL)">
            <p style="font-size:12px; margin-bottom:5px;">🖇 Прикрепить видео/фото (URL):</p>
            <input type="text" id="pMedia" placeholder="Прямая ссылка на файл">
            <button class="profile-btn" style="width:100%" onclick="savePost()">Отправить</button>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <h2>Точно ли удалить этот пост?</h2>
            <div style="display:flex; gap:10px; margin-top:25px;">
                <button class="profile-btn red-btn" style="flex:1" id="finalDelBtn">Удалить</button>
                <button class="profile-btn" style="flex:1" onclick="closeModal('confirmModal')">Отмена</button>
            </div>
        </div>
    </div>

    <div id="loginOverlay" class="modal" style="display:flex; background: var(--dark);">
        <div class="modal-content" style="text-align:center;">
            <h1 style="margin-bottom:20px; color:var(--light)">Вход в MediaStudio</h1>
            <div id="loginView">
                <input type="text" id="lEmail" placeholder="Email или Никнейм">
                <input type="password" id="lPass" placeholder="Пароль">
                <button class="profile-btn" style="width:100%" onclick="login()">Войти</button>
                <p style="margin-top:15px; cursor:pointer; font-size:13px;" onclick="toggleAuth(true)">Нет аккаунта? Регистрация</p>
            </div>
            <div id="regView" class="hidden">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="rFirst" placeholder="Имя">
                    <input type="text" id="rLast" placeholder="Фамилия">
                </div>
                <input type="text" id="rUser" placeholder="Никнейм">
                <input type="email" id="rEmail" placeholder="Email">
                <input type="password" id="rPass" placeholder="Пароль">
                <button class="profile-btn" style="width:100%" onclick="register()">Создать аккаунт</button>
                <p style="margin-top:15px; cursor:pointer; font-size:13px;" onclick="toggleAuth(false)">Уже есть аккаунт? Войти</p>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        let user = null;
        let allPosts = [];

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function toggleAuth(reg) {
            document.getElementById('loginView').className = reg ? 'hidden' : '';
            document.getElementById('regView').className = reg ? '' : 'hidden';
        }

        async function login() {
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ login_input: document.getElementById('lEmail').value, password: document.getElementById('lPass').value })
            });
            const data = await res.json();
            if(data.success) { user = data.user; initApp(); } else { alert("Ошибка входа"); }
        }

        async function register() {
            const res = await fetch(`${API}/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    first_name: document.getElementById('rFirst').value, last_name: document.getElementById('rLast').value,
                    username: document.getElementById('rUser').value, email: document.getElementById('rEmail').value, password: document.getElementById('rPass').value
                })
            });
            const data = await res.json();
            if(data.success) { alert("Успех! Теперь войдите."); toggleAuth(false); } else { alert(data.error); }
        }

        function initApp() {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('sidebar').classList.remove('hidden');
            
            // Личный кабинет данные
            document.getElementById('userData').innerHTML = `
                <p><b>Имя:</b> ${user.first_name}</p>
                <p><b>Фамилия:</b> ${user.last_name}</p>
                <p><b>Никнейм:</b> @${user.username}</p>
                <p><b>Роль:</b> ${user.role === 'assistant_manager' ? 'Помощник руководителя' : (user.role === 'manager' ? 'Руководитель' : 'Подписчик')}</p>
            `;

            if(user.role === 'assistant_manager') {
                document.getElementById('admin-tools').classList.remove('hidden');
                document.getElementById('post-tools').classList.remove('hidden');
            } else if(user.role === 'manager') {
                document.getElementById('post-tools').classList.remove('hidden');
            }
            loadPosts();
        }

        async function loadPosts() {
            const res = await fetch(`${API}/posts`);
            allPosts = await res.json();
            const list = document.getElementById('posts-list');
            const empty = document.getElementById('empty-msg');
            
            list.innerHTML = '';
            if(allPosts.length === 0) { empty.classList.remove('hidden'); } 
            else {
                empty.classList.add('hidden');
                allPosts.forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'post';
                    div.innerHTML = `
                        <h2>${post.title}</h2>
                        <div class="post-tags">${post.hashtags || ''}</div>
                        <p>${post.content}</p>
                        ${post.media_url ? renderMedia(post.media_url) : ''}
                        ${post.link_url ? `<a href="${post.link_url}" target="_blank" class="post-tags" style="text-decoration:underline">🔗 Ссылка в посте</a>` : ''}
                        <div style="margin-top:20px; font-size:12px; opacity:0.5;">Лайков: 0 | Комментариев: 0</div>
                    `;
                    list.appendChild(div);
                });
            }
        }

        function renderMedia(url) {
            if(url.match(/\.(mp4|webm|ogg)$/)) return `<video src="${url}" controls></video>`;
            return `<img src="${url}" style="width:100%; border-radius:15px; margin:15px 0;">`;
        }

        async function savePost() {
            const data = {
                author_id: user.id, author_name: user.username,
                title: document.getElementById('pTitle').value,
                content: document.getElementById('pText').value,
                hashtags: document.getElementById('pTags').value,
                media_url: document.getElementById('pMedia').value,
                link_url: document.getElementById('pLink').value
            };
            await fetch(`${API}/posts`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            closeModal('postModal'); loadPosts();
        }

        function openDeleteList() {
            let id = prompt("Введите заголовок поста для удаления:\n" + allPosts.map(p => p.title).join("\n"));
            let post = allPosts.find(p => p.title === id);
            if(post) {
                openModal('confirmModal');
                document.getElementById('finalDelBtn').onclick = async () => {
                    await fetch(`${API}/posts/${post.id}`, { method: 'DELETE' });
                    closeModal('confirmModal'); loadPosts();
                };
            }
        }

        function logout() { location.reload(); }

        // Эффект лепестков
        setInterval(() => {
            const c = document.getElementById('flowers-container');
            const f = document.createElement('div');
            f.className = 'flower';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.width = f.style.height = (Math.random() * 10 + 7) + 'px';
            f.style.animationDuration = (Math.random() * 3 + 2) + 's';
            c.appendChild(f); setTimeout(() => f.remove(), 4000);
        }, 150);
    </script>
</body>
</html>
