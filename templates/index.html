<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaStudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #240046 0%, #3c096c 50%, #7b2cbf 100%);
            color: #fff; min-height: 100vh; overflow-x: hidden;
        }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: rgba(255,255,255,0.2); backdrop-filter: blur(15px);
            padding: 15px 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3);
            transition: 0.5s; z-index: 1000; font-weight: 700;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }

        .container { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .hidden { display: none !important; }

        /* Дизайн карточек */
        .card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            width: 100%; max-width: 500px; margin-bottom: 20px;
        }

        input, textarea {
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px;
            border: none; background: rgba(255,255,255,0.1); color: #fff; outline: none;
        }

        .rainbow-btn {
            position: relative; padding: 3px; border-radius: 15px; background: transparent;
            border: none; cursor: pointer; overflow: hidden; width: 100%;
        }
        .rainbow-btn span {
            display: block; padding: 12px; background: #5a189a; border-radius: 13px;
            font-weight: 800; color: #fff; position: relative; z-index: 2;
        }
        .rainbow-btn:hover::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);
            animation: spin 2s linear infinite; z-index: 1;
        }

        /* Стили постов */
        .post { animation: slideUp 0.5s ease forwards; }
        .post img, .post video { width: 100%; border-radius: 15px; margin: 15px 0; }
        .post-link { color: #e0aaff; font-weight: 800; text-decoration: none; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        #flowers-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .flower { position: absolute; background: #e0aaff; border-radius: 10px 0; opacity: 0.4; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>
    <div id="toast">Сообщение</div>
    <div id="flowers-container"></div>

    <div class="container">
        <div id="auth-box" class="card">
            <h1 id="auth-title" style="text-align:center; margin-bottom:20px; color:#e0aaff;">Вход</h1>
            <form id="loginForm">
                <input type="text" id="lInput" placeholder="Почта или Никнейм" required>
                <input type="password" id="lPass" placeholder="Пароль" required>
                <button type="submit" class="rainbow-btn"><span>Войти</span></button>
                <p style="text-align:center; margin-top:15px; font-size:13px; cursor:pointer;" onclick="toggleAuth()">Нет аккаунта? Регистрация</p>
            </form>

            <form id="regForm" class="hidden">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="rFirst" placeholder="Имя" required>
                    <input type="text" id="rLast" placeholder="Фамилия" required>
                </div>
                <input type="text" id="rUser" placeholder="Никнейм" required>
                <input type="email" id="rEmail" placeholder="Email" required>
                <input type="password" id="rPass" placeholder="Пароль" required>
                <button type="submit" class="rainbow-btn"><span>Создать аккаунт</span></button>
                <p style="text-align:center; margin-top:15px; font-size:13px; cursor:pointer;" onclick="toggleAuth()">Уже есть аккаунт? Войти</p>
            </form>
        </div>

        <div id="admin-zone" class="hidden" style="width:100%; max-width:500px;">
            <div id="assistant-tools" class="card hidden" style="border-color: #ff9e00;">
                <h3 style="color:#ff9e00;">👑 Помощник руководителя</h3>
                <input type="text" id="targetNick" placeholder="Ник будущего руководителя">
                <button class="rainbow-btn" onclick="promoteUser()"><span>Назначить руководителя</span></button>
            </div>

            <div id="manager-tools" class="card hidden">
                <h3>📝 Новый пост</h3>
                <input type="text" id="pTitle" placeholder="Заголовок">
                <textarea id="pContent" placeholder="Текст..."></textarea>
                <input type="text" id="pMedia" placeholder="Ссылка на фото/видео">
                <input type="text" id="pLink" placeholder="Ссылка на файл">
                <button class="rainbow-btn" onclick="sendPost()"><span>Опубликовать</span></button>
            </div>
        </div>

        <div id="feed" class="hidden" style="width:100%; max-width:600px;">
            <div id="posts-list"></div>
        </div>
    </div>

    <script>
        const API = '/api';
        let user = null;

        function showMsg(t, color="#fff") {
            const el = document.getElementById('toast');
            el.innerText = t; el.style.color = color;
            el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 3000);
        }

        function toggleAuth() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('regForm').classList.toggle('hidden');
            document.getElementById('auth-title').innerText = document.getElementById('regForm').classList.contains('hidden') ? 'Вход' : 'Регистрация';
        }

        // ВХОД
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    login_input: document.getElementById('lInput').value,
                    password: document.getElementById('lPass').value
                })
            });
            const data = await res.json();
            if(data.success) {
                user = data.user;
                showMsg(`Привет, ${user.username}!`);
                startApp();
            } else { showMsg(data.error, "#ff4b4b"); }
        };

        // РЕГИСТРАЦИЯ
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${API}/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    first_name: document.getElementById('rFirst').value,
                    last_name: document.getElementById('rLast').value,
                    username: document.getElementById('rUser').value,
                    email: document.getElementById('rEmail').value,
                    password: document.getElementById('rPass').value
                })
            });
            const data = await res.json();
            if(data.success) { showMsg("Успех! Теперь войдите."); toggleAuth(); }
            else { showMsg(data.error, "#ff4b4b"); }
        };

        function startApp() {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('feed').classList.remove('hidden');
            document.getElementById('admin-zone').classList.remove('hidden');
            
            if(user.role === 'assistant_manager') {
                document.getElementById('assistant-tools').classList.remove('hidden');
                document.getElementById('manager-tools').classList.remove('hidden');
            } else if(user.role === 'manager') {
                document.getElementById('manager-tools').classList.remove('hidden');
            }
            loadPosts();
        }

        async function loadPosts() {
            const res = await fetch(`${API}/posts`);
            const posts = await res.json();
            const list = document.getElementById('posts-list');
            list.innerHTML = '';
            posts.forEach(p => {
                const div = document.createElement('div');
                div.className = 'card post';
                div.innerHTML = `
                    <h3>${p.title}</h3>
                    <p style="margin:10px 0;">${p.content}</p>
                    ${p.media_url ? (p.media_url.includes('mp4') ? `<video src="${p.media_url}" controls></video>` : `<img src="${p.media_url}">`) : ''}
                    ${p.link_url ? `<a href="${p.link_url}" class="post-link" target="_blank">🔗 Открыть ссылку</a>` : ''}
                    <div style="margin-top:15px; display:flex; justify-content:space-between; font-size:12px; opacity:0.6;">
                        <span>Автор: ${p.author_name}</span>
                        <span onclick="like(${p.id})" style="cursor:pointer; color:#ff4b4b; font-weight:800;">❤️ Лайк</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function sendPost() {
            await fetch(`${API}/posts`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    author_id: user.id,
                    author_name: user.username,
                    title: document.getElementById('pTitle').value,
                    content: document.getElementById('pContent').value,
                    media_url: document.getElementById('pMedia').value,
                    link_url: document.getElementById('pLink').value
                })
            });
            showMsg("Опубликовано!"); loadPosts();
        }

        async function promoteUser() {
            const target = document.getElementById('targetNick').value;
            const res = await fetch(`${API}/promote`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ target })
            });
            const data = await res.json();
            showMsg(data.message);
        }

        // Снегопад лепестков
        setInterval(() => {
            const c = document.getElementById('flowers-container');
            const f = document.createElement('div');
            f.className = 'flower';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.width = f.style.height = (Math.random() * 10 + 7) + 'px';
            f.style.animationDuration = (Math.random() * 3 + 2) + 's';
            c.appendChild(f); setTimeout(() => f.remove(), 4000);
        }, 100);
    </script>
</body>
</html>
