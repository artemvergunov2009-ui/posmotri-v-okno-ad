<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaStudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #240046 0%, #3c096c 50%, #7b2cbf 100%);
            color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        /* КРАСИВОЕ УВЕДОМЛЕНИЕ ВНУТРИ САЙТА */
        #toast {
            position: fixed; top: 20px; transform: translateY(-150%);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            padding: 15px 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000;
        }
        #toast.show { transform: translateY(0); }

        .content-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            padding: 35px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            width: 90%; max-width: 400px; z-index: 10; text-align: center;
        }

        .input-group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 14px; border: none; border-radius: 12px;
            background: rgba(255, 255, 255, 0.1); color: #fff; outline: none; transition: 0.3s;
        }
        input:focus { background: rgba(255, 255, 255, 0.2); }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }

        .rainbow-btn {
            position: relative; padding: 3px; border-radius: 20px; background: transparent;
            border: none; cursor: pointer; overflow: hidden; width: 100%;
        }
        .rainbow-btn span {
            display: block; padding: 14px; background: #5a189a; border-radius: 17px;
            font-weight: 800; color: #fff; position: relative; z-index: 2;
        }
        .rainbow-btn:hover::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000);
            z-index: 1; animation: spin 2s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .toggle-btn { margin-top: 20px; font-size: 13px; color: #c77dff; cursor: pointer; text-decoration: underline; }
        .hidden { display: none; }
        #flowers-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .flower { position: absolute; background: #e0aaff; border-radius: 10px 0; opacity: 0.5; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>
    <div id="toast">Сообщение</div>
    <div id="flowers-container"></div>

    <div class="content-card">
        <h1 id="title" style="margin-bottom: 25px; color: #e0aaff;">С возвращением</h1>

        <form id="loginForm">
            <div class="input-group"><input type="text" id="lInput" placeholder="Email или Никнейм" required></div>
            <div class="input-group"><input type="password" id="lPass" placeholder="Пароль" required></div>
            <button type="submit" class="rainbow-btn"><span>Войти</span></button>
            <p class="toggle-btn" onclick="toggle()">Создать аккаунт</p>
        </form>

        <form id="registerForm" class="hidden">
            <div class="input-row">
                <input type="text" id="rFirst" placeholder="Имя" required>
                <input type="text" id="rLast" placeholder="Фамилия" required>
            </div>
            <div class="input-group"><input type="text" id="rUser" placeholder="Никнейм" required></div>
            <div class="input-group"><input type="email" id="rEmail" placeholder="Email" required></div>
            <div class="input-group"><input type="password" id="rPass" placeholder="Пароль" required></div>
            <button type="submit" class="rainbow-btn"><span>Зарегистрироваться</span></button>
            <p class="toggle-btn" onclick="toggle()">Уже есть аккаунт</p>
        </form>
    </div>

    <script>
        const API = 'https://mediastudio-creative-mdpz.onrender.com/api';

        function notify(text, color = "#e0aaff") {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.color = color;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function toggle() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
            document.getElementById('title').innerText = 
                document.getElementById('loginForm').classList.contains('hidden') ? 'Регистрация' : 'С возвращением';
        }

        // РЕГИСТРАЦИЯ
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${API}/register`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    first_name: document.getElementById('rFirst').value,
                    last_name: document.getElementById('rLast').value,
                    username: document.getElementById('rUser').value,
                    email: document.getElementById('rEmail').value,
                    password: document.getElementById('rPass').value
                })
            });
            const data = await res.json();
            if(data.success) { notify("Успех! Войдите в аккаунт", "#4bff4b"); toggle(); }
            else { notify("Ошибка: " + data.error, "#ff4b4b"); }
        };

        // ВХОД
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    login_input: document.getElementById('lInput').value,
                    password: document.getElementById('lPass').value
                })
            });
            const data = await res.json();
            if(data.success) { notify(`Привет, ${data.user.username}!`, "#4bff4b"); }
            else { notify("Неверный логин или пароль", "#ff4b4b"); }
        };

        // ЛЕПЕСТКИ
        setInterval(() => {
            const c = document.getElementById('flowers-container');
            const f = document.createElement('div');
            f.className = 'flower';
            f.style.left = Math.random() * 100 + 'vw';
            f.style.width = f.style.height = (Math.random() * 8 + 8) + 'px';
            f.style.animationDuration = (Math.random() * 3 + 2) + 's';
            c.appendChild(f);
            setTimeout(() => f.remove(), 4000);
        }, 100);
    </script>
</body>
</html>
