<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Samberrrgram</title>
    <style>
        :root {
            --bg-color: #fdfaf5;
            --card-bg: #ffffff;
            --main-color: #d1a982;
            --main-color-hover: #b8916b;
            --text-color-dark: #3e2723;
            --text-color-light: #8d6e63;
            --error-color: #d9534f;
            --border-radius: 25px;
            --input-radius: 15px;
            --main-shadow: 0 10px 30px rgba(210, 170, 130, 0.15);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color-dark);
        }

        /* Основная карточка входа */
        .login-card { 
            background: var(--card-bg); 
            padding: 50px 40px; 
            border-radius: var(--border-radius); 
            box-shadow: var(--main-shadow); 
            text-align: center; 
            width: 100%;
            max-width: 350px; 
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        /* Логотип */
        .logo {
            font-size: 2.2em;
            font-weight: bold;
            color: var(--main-color);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-color-light);
            font-size: 0.95em;
            margin-bottom: 30px;
        }

        /* Сообщение об ошибке */
        .error-msg { 
            background-color: #fce4e4;
            color: var(--error-color); 
            padding: 10px;
            border-radius: var(--input-radius);
            margin-bottom: 20px; 
            font-size: 0.85em;
            font-weight: bold;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input { 
            padding: 15px 20px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid rgba(0,0,0,0.06); 
            border-radius: var(--input-radius); 
            background-color: #fcf9f5;
            font-size: 16px; 
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: var(--text-color-dark);
        }

        input:focus {
            border-color: var(--main-color);
            box-shadow: 0 0 0 4px rgba(209, 169, 130, 0.1);
        }

        /* Кнопка */
        button { 
            margin-top: 10px;
            padding: 15px; 
            background-color: var(--main-color); 
            color: white; 
            border: none; 
            border-radius: var(--input-radius); 
            cursor: pointer; 
            font-size: 17px; 
            width: 100%; 
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 10px rgba(209, 169, 130, 0.2);
        }

        button:hover { 
            background-color: var(--main-color-hover); 
        }

        button:active {
            transform: scale(0.98);
        }

        /* Подсказка внизу */
        .hint { 
            font-size: 0.8em; 
            color: var(--text-color-light); 
            margin-top: 25px; 
            line-height: 1.4;
        }

        /* Ссылка на восстановление или доп. инфо (декор) */
        .footer-link {
            display: block;
            margin-top: 15px;
            font-size: 0.85em;
            color: var(--main-color);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Samberrrgram</div>
        <div class="subtitle">Твой уютный мессенджер</div>
        
        {% if error %}
            <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="input-group">
                <input type="text" name="username" placeholder="Никнейм" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Пароль" required>
            </div>
            <button type="submit">Войти</button>
        </form>
        
        <div class="hint">
            Новый здесь? Просто введи ник и пароль — аккаунт создастся автоматически.
        </div>
    </div>
</body>
</html>
